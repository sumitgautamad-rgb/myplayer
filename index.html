<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Video</title>
    <style>
        body { background: #111; color: white; text-align: center; margin: 0; padding: 0; }
        .ad-btn { background: orange; color: black; padding: 15px; display: block; text-decoration: none; font-weight: bold; margin: 10px; border-radius: 5px; }
        iframe { width: 100%; height: 400px; border: none; background: #000; }
    </style>
</head>
<body>
    <h3>आपका वीडियो लोड हो रहा है...</h3>

    <!-- कमाई वाला बटन (AD) -->
    <a href="YOUR_ADSTERRA_DIRECT_LINK" class="ad-btn" target="_blank">क्लिक करें: वीडियो अनलॉक करें (AD)</a>

    <!-- TeraBox Player (बिना API वाला तरीका) -->
    <div id="video-container">
        <iframe id="player" src=""></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let teraLink = urlParams.get('url');
        
        if (teraLink) {
            // यहाँ हम एक पब्लिक बाईपास प्लेयर का इस्तेमाल कर रहे हैं
            let finalStream = teraLink.replace("terabox.com", "terabox-player.me");
            document.getElementById('player').src = finalStream;
        }
    </script>
</body>
</html>
